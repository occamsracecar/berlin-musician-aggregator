name: Scrape musician listings

on:
  schedule:
    # Daily at 06:00 UTC (~07:00 Berlin in summer, ~08:00 in winter)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      board:
        description: "Optional single board (e.g. bandmix.de). Leave empty for all boards."
        required: false
        type: string
      full_scrape:
        description: "Re-scrape every listing (slow, ~30–60 min). Default is new listings only."
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPE_BOARD: ${{ github.event.inputs.board }}
          SCRAPE_INCREMENTAL: ${{ github.event.inputs.full_scrape != 'true' && 'true' || 'false' }}
        run: |
          set -o pipefail
          npm run scrape 2>&1 | tee scrape.log

      - name: Scrape summary
        if: always()
        run: |
          echo "## Scrape run $(date -u +"%Y-%m-%d %H:%M UTC")" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Mode:** ${{ github.event.inputs.full_scrape == 'true' && 'full (all listings)' || 'incremental (new listings only)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f scrape.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E '^\[summary\]|^Done\.|^Incremental|^Completed with|FAILED:' scrape.log | tail -20 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Daily cron only fetches **new** URLs not already in the database. A red run usually means one board failed, not that nothing was saved." >> "$GITHUB_STEP_SUMMARY"
